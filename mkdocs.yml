site_name: Siklab Core
site_description: Turn a plain-language brief into a working web app, built and delivered by a fleet of AI agents.
site_author: Siklab
# Set this to your published URL before deploying, e.g. https://<org>.github.io/siklab-docs/
site_url: "https://bakunawa-siklabcore.github.io/siklab-docs/"

theme:
  name: material
  language: en
  palette:
    # Light
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting Started: getting-started.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details

plugins:
  - search
